            - text: "#"
        - paragraph [ref=e272]:
          - text: When using
          - code [ref=e273]: "`node-pty`"
          - text: to run shell commands, you should be aware of the security risks. Avoid passing untrusted input directly to the shell commands. Sanitize and validate user input to prevent shell injection attacks.
