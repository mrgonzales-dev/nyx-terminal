        - heading "What is the difference between a real terminal and a pseudo-terminal?Link to section" [level=3] [ref=e283]:
          - text: What is the difference between a real terminal and a pseudo-terminal?
          - link "Link to section" [ref=e284] [cursor=pointer]:
            - /url: "#what-is-the-difference-between-a-real-terminal-and-a-pseudo-terminal"
            - text: "#"
        - paragraph [ref=e285]: A real terminal is a physical device, such as a terminal emulator on a computer screen connected to a serial port. A pseudo-terminal is a virtual device that emulates a real terminal. It allows applications to interact with shell processes in a similar way to a real terminal, but without the need for physical hardware.
        - 'heading "Can I use `node-pty` on different operating systems?Link to section" [level=3] [ref=e286]':
          - text: Can I use
          - code [ref=e287]: "`node-pty`"
          - text: on different operating systems?
          - link "Link to section" [ref=e288] [cursor=pointer]:
            - /url: "#can-i-use-node-pty-on-different-operating-systems"
            - text: "#"
        - paragraph [ref=e289]:
          - text: Yes,
          - code [ref=e290]: "`node-pty`"
          - text: is cross-platform. It supports Windows, macOS, and Linux. You just need to choose the appropriate shell command based on the operating system, as shown in the examples above.
        - 'heading "Is it safe to run shell commands using `node-pty`?Link to section" [level=3] [ref=e291]':
          - text: Is it safe to run shell commands using
          - code [ref=e292]: "`node-pty`"
          - text: "?"
          - link "Link to section" [ref=e293] [cursor=pointer]:
            - /url: "#is-it-safe-to-run-shell-commands-using-node-pty"
            - text: "#"
        - paragraph [ref=e294]: It can be safe if you follow proper security practices. Avoid passing untrusted input directly to the shell commands. Sanitize and validate user input to prevent shell injection attacks.
