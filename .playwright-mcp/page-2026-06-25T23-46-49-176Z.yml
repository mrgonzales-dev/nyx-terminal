        - paragraph [ref=e147]:
          - text: In this example, we use Socket.IO to establish a real-time connection between the client and the server. The server spawns a shell process and sends the output of the shell to the client when it receives the
          - code [ref=e148]: "`data`"
          - text: event. When the client sends input, the server writes it to the shell.
        - heading "Automated Testing of Shell ScriptsLink to section" [level=3] [ref=e149]:
          - text: Automated Testing of Shell Scripts
          - link "Link to section" [ref=e150] [cursor=pointer]:
