        - heading "Web-Based TerminalsLink to section" [level=3] [ref=e108]:
          - text: Web-Based Terminals
          - link "Link to section" [ref=e109] [cursor=pointer]:
            - /url: "#web-based-terminals"
            - text: "#"
        - paragraph [ref=e110]:
          - text: Web-based terminals are becoming increasingly popular, especially in the context of cloud computing and container management. With
          - code [ref=e111]: "`node-pty`"
          - text: ", you can build a web server that spawns a shell process and streams the input and output between the client's browser and the shell. The client can then interact with the shell just like they would in a local terminal."
        - paragraph [ref=e112]:
          - text: Here is a simple example using Express.js and
          - code [ref=e113]: "`node-pty`"
          - text: ":"
