        - heading "What is a Pseudo-Terminal?Link to section" [level=3] [ref=e70]:
          - text: What is a Pseudo-Terminal?
          - link "Link to section" [ref=e71] [cursor=pointer]:
            - /url: "#what-is-a-pseudo-terminal"
            - text: "#"
        - paragraph [ref=e72]:
          - text: A pseudo-terminal, often abbreviated as
          - code [ref=e73]: "`pty`"
          - text: ", is a pair of virtual devices: a master and a slave. The slave end acts like a real terminal device, and processes can attach to it just like they would to a physical terminal. The master end is used by the controlling process to read and write data to the slave. In the context of Node.js, the"
          - code [ref=e74]: "`pty`"
          - text: module allows developers to create and manage these pseudo-terminals.
        - heading "How Node.js PTY WorksLink to section" [level=3] [ref=e75]:
          - text: How Node.js PTY Works
          - link "Link to section" [ref=e76] [cursor=pointer]:
            - /url: "#how-node-js-pty-works"
            - text: "#"
        - paragraph [ref=e77]:
          - text: The
          - code [ref=e78]: "`node-pty`"
          - text: library is a popular choice for working with pseudo-terminals in Node.js. It provides a high-level API to spawn shell processes and interact with them. When you use
          - code [ref=e79]: "`node-pty`"
          - text: to spawn a shell, it creates a new pseudo-terminal instance. The master end of the
          - code [ref=e80]: "`pty`"
          - text: is connected to your Node.js application, and the slave end is connected to the shell process. You can then send commands to the shell by writing to the master end and receive the output of the commands by reading from it.
        - paragraph [ref=e81]:
          - text: Here is a simple example of spawning a shell using
          - code [ref=e82]: "`node-pty`"
          - text: ":"
        - figure [ref=e83]:
          - code [ref=e85]:
            - generic [ref=e86]: const pty = require('node-pty');
            - generic [ref=e88]: "const shell = process.platform === 'win32' ? 'powershell.exe' : 'bash';"
            - generic [ref=e89]: "const ptyProcess = pty.spawn(shell, [], {"
            - generic [ref=e90]: "name: 'xterm-color',"
            - generic [ref=e91]: "cols: 80,"
            - generic [ref=e92]: "rows: 30,"
            - generic [ref=e93]: "cwd: process.env.HOME,"
            - generic [ref=e94]: "env: process.env"
            - generic [ref=e95]: "});"
            - generic [ref=e97]: "ptyProcess.on('data', function(data) {"
            - generic [ref=e98]: console.log(data);
            - generic [ref=e99]: "});"
            - generic [ref=e101]: ptyProcess.write('ls\n');
        - paragraph [ref=e102]:
          - text: In this example, we first determine the appropriate shell based on the operating system. Then we spawn a new shell process using
          - code [ref=e103]: "`pty.spawn`"
          - text: . We listen for the
          - code [ref=e104]: "`data`"
          - text: event to receive the output of the shell commands. Finally, we send the
          - code [ref=e105]: "`ls`"
          - text: command to the shell.
        - heading "Typical Usage ScenariosLink to section" [level=2] [ref=e106]:
          - text: Typical Usage Scenarios
