          - text: Pseudo-terminals and shell processes consume system resources. You should make sure to close the
          - code [ref=e249]: "`pty`"
          - text: process when it's no longer needed. You can do this by calling the
          - code [ref=e250]: "`kill`"
          - text: method on the
          - code [ref=e251]: "`pty`"
          - text: process.
