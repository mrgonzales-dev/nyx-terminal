<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyx</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'JetBrainsMono Nerd Font';
      src: url('/JetBrainsMonoNerdFont-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'JetBrainsMono Nerd Font';
      src: url('/JetBrainsMonoNerdFont-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      background: url('/nyx-bg.png') center center / cover no-repeat;
      background-color: #0a0a0f;
    }

    /* Top Banner */
    #banner {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      background: rgba(10, 10, 15, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    #banner h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #banner .subtitle {
      margin-left: 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    /* Main Content Area */
    #main-content {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 16px;
      min-height: 0;
    }

    /* Terminals Area */
    #terminals-area {
      flex: 1;
      display: flex;
      gap: 16px;
      min-width: 0;
    }

    /* Terminal Container */
    .terminal-container {
      flex: 1;
      position: relative;
      background: rgba(10, 10, 15, 0.85);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 300px;
    }

    .terminal-header {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .terminal-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .terminal-close {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all 0.15s ease;
    }

    .terminal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #f87171;
    }

    .terminal-wrapper {
      flex: 1;
      margin: 12px;
      overflow: hidden;
    }

    .xterm {
      height: 100%;
      background: transparent !important;
    }

    .xterm-viewport {
      overflow-y: auto !important;
      background: transparent !important;
    }

    .xterm-screen {
      background: transparent !important;
    }

    .xterm canvas {
      background: transparent !important;
    }

    .xterm-viewport::-webkit-scrollbar {
      width: 8px;
    }

    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }

    .xterm-viewport::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }

    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* Directory Tree Panel */
    #tree-panel {
      width: 280px;
      background: rgba(10, 10, 15, 0.85);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #tree-panel.open {
      display: flex;
    }

    #tree-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #tree-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #tree-close {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
    }

    #tree-close:hover {
      color: #fff;
    }

    #tree-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: 'JetBrainsMono Nerd Font', 'Fira Code', monospace;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }

    #tree-content::-webkit-scrollbar {
      width: 6px;
    }

    #tree-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    .tree-item {
      padding: 4px 0;
      cursor: pointer;
      white-space: nowrap;
    }

    .tree-item:hover {
      color: #fff;
    }

    .tree-folder {
      color: #60a5fa;
    }

    .tree-file {
      color: rgba(255, 255, 255, 0.6);
    }

    .tree-indent {
      display: inline-block;
      width: 16px;
    }

    /* Footer Buttons */
    #footer {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 24px;
      background: rgba(10, 10, 15, 0.9);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .footer-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .footer-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
      color: #fff;
    }

    .footer-btn:active {
      background: rgba(255, 255, 255, 0.06);
      transform: scale(0.98);
    }

    .footer-btn.active {
      background: rgba(167, 139, 250, 0.2);
      border-color: rgba(167, 139, 250, 0.4);
      color: #c4b5fd;
    }

    .footer-btn svg {
      width: 16px;
      height: 16px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <!-- Top Banner -->
  <div id="banner">
    <h1>Nyx</h1>
    <span class="subtitle">Terminal</span>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <div id="terminals-area">
      <!-- Terminals will be added here dynamically -->
    </div>

    <!-- Directory Tree Panel -->
    <div id="tree-panel">
      <div id="tree-header">
        <h2>Files</h2>
        <button id="tree-close">&times;</button>
      </div>
      <div id="tree-content">
        <div class="tree-item tree-folder">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Footer Buttons -->
  <div id="footer">
    <button class="footer-btn" id="btn-tree">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 7h4v4H3zM3 15h4v4H3zM11 7h10M11 12h10M11 17h10"/>
      </svg>
      Files
    </button>
    <button class="footer-btn" id="btn-add-terminal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      New Terminal
    </button>
    <button class="footer-btn" id="btn-save">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Save
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script>
    // Terminal configuration
    const terminalConfig = {
      theme: {
        background: 'transparent',
        foreground: '#e4e4e7',
        cursor: '#a78bfa',
        cursorAccent: '#0a0a0f',
        selectionBackground: 'rgba(167, 139, 250, 0.3)',
        selectionForeground: '#ffffff',
        black: '#18181b',
        red: '#f87171',
        green: '#4ade80',
        yellow: '#facc15',
        blue: '#60a5fa',
        magenta: '#c084fc',
        cyan: '#22d3ee',
        white: '#e4e4e7',
        brightBlack: '#52525b',
        brightRed: '#fca5a5',
        brightGreen: '#86efac',
        brightYellow: '#fde047',
        brightBlue: '#93c5fd',
        brightMagenta: '#d8b4fe',
        brightCyan: '#67e8f9',
        brightWhite: '#fafafa'
      },
      fontFamily: '"JetBrainsMono Nerd Font", "Fira Code", "JetBrains Mono", monospace',
      fontSize: 14,
      fontWeight: '400',
      fontWeightBold: '600',
      letterSpacing: 0,
      lineHeight: 1.4,
      cursorBlink: true,
      cursorStyle: 'bar',
      cursorWidth: 2,
      allowTransparency: true,
      scrollback: 10000,
      smoothScrollDuration: 100
    };

    // Store all terminals
    const terminals = [];
    let terminalCounter = 0;
    const terminalsArea = document.getElementById('terminals-area');

    // Load session from server
    async function loadSession() {
      try {
        const res = await fetch('/api/session');
        return await res.json();
      } catch (e) {
        return { terminals: [{ id: 1, cwd: null }] };
      }
    }

    // Save session to server
    async function saveSession() {
      const data = {
        terminals: terminals.map(t => ({
          id: t.id,
          cwd: t.cwd || null
        })),
        treeOpen: treePanel.classList.contains('open')
      };
      try {
        await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } catch (e) {}
    }

    // Auto-save every 5 seconds
    setInterval(saveSession, 5000);

    // Create a new terminal
    function createTerminal(cwd = null) {
      const id = ++terminalCounter;
      
      // Create DOM elements
      const container = document.createElement('div');
      container.className = 'terminal-container';
      container.id = `terminal-${id}`;
      
      container.innerHTML = `
        <div class="terminal-header">
          <span class="terminal-title">Terminal ${id}</span>
          <button class="terminal-close" data-id="${id}">&times;</button>
        </div>
        <div class="terminal-wrapper" id="terminal-wrapper-${id}"></div>
      `;
      
      terminalsArea.appendChild(container);

      // Create terminal instance
      const term = new Terminal(terminalConfig);
      const fitAddon = new FitAddon.FitAddon();
      const webLinksAddon = new WebLinksAddon.WebLinksAddon();

      term.loadAddon(fitAddon);
      term.loadAddon(webLinksAddon);
      term.open(document.getElementById(`terminal-wrapper-${id}`));

      // WebSocket connection with cwd
      const wsUrl = cwd 
        ? `ws://${window.location.host}?cwd=${encodeURIComponent(cwd)}`
        : `ws://${window.location.host}`;
      const ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        const dims = fitAddon.proposeDimensions();
        if (dims) {
          ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
        }
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'tree') {
            renderTree(data);
            return;
          }
        } catch (e) {}
        term.write(event.data);
      };

      ws.onclose = () => {};
      ws.onerror = () => ws.close();

      term.onData((data) => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
      });

      term.onResize(({ cols, rows }) => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });

      // Focus on click
      container.addEventListener('click', () => term.focus());

      // Close button
      container.querySelector('.terminal-close').addEventListener('click', (e) => {
        e.stopPropagation();
        closeTerminal(id);
      });

      // Store terminal data
      const termData = { id, term, fitAddon, ws, container, cwd: cwd || null };
      terminals.push(termData);

      // Track cwd changes by monitoring output for prompt patterns
      let cwdBuffer = '';
      const originalOnMessage = ws.onmessage;
      ws.onmessage = (event) => {
        // Try to detect cwd from OSC sequences or prompt
        const data = event.data;
        if (typeof data === 'string') {
          // Check for OSC 7 (current directory) or common prompt patterns
          const oscMatch = data.match(/\x1b\]7;file:\/\/[^\/]*([^\x07\x1b]+)/);
          if (oscMatch) {
            termData.cwd = oscMatch[1];
          }
        }
        originalOnMessage.call(ws, event);
      };

      // Fit after DOM update
      setTimeout(() => {
        fitAllTerminals();
        term.focus();
      }, 50);

      return termData;
    }

    // Close a terminal
    function closeTerminal(id) {
      const index = terminals.findIndex(t => t.id === id);
      if (index === -1) return;
      
      // Don't close if it's the last terminal
      if (terminals.length === 1) return;

      const termData = terminals[index];
      termData.ws.close();
      termData.term.dispose();
      termData.container.remove();
      terminals.splice(index, 1);

      // Fit remaining terminals
      setTimeout(fitAllTerminals, 50);

      // Focus another terminal
      if (terminals.length > 0) {
        terminals[0].term.focus();
      }
    }

    // Fit all terminals
    function fitAllTerminals() {
      terminals.forEach(t => {
        try {
          t.fitAddon.fit();
        } catch (e) {}
      });
    }

    // Debounced resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(fitAllTerminals, 50);
    });

    // Tree panel (declare early for saveSession)
    const treePanel = document.getElementById('tree-panel');
    const treeClose = document.getElementById('tree-close');
    const treeContent = document.getElementById('tree-content');
    const btnTree = document.getElementById('btn-tree');
    const btnAddTerminal = document.getElementById('btn-add-terminal');

    function toggleTree() {
      treePanel.classList.toggle('open');
      btnTree.classList.toggle('active', treePanel.classList.contains('open'));
      setTimeout(fitAllTerminals, 50);
      if (treePanel.classList.contains('open')) {
        loadTree();
      }
    }

    treeClose.addEventListener('click', () => {
      treePanel.classList.remove('open');
      btnTree.classList.remove('active');
      setTimeout(fitAllTerminals, 50);
    });

    btnTree.addEventListener('click', toggleTree);

    btnAddTerminal.addEventListener('click', () => {
      createTerminal();
    });

    const btnSave = document.getElementById('btn-save');
    btnSave.addEventListener('click', async () => {
      btnSave.classList.add('active');
      await saveSession();
      setTimeout(() => btnSave.classList.remove('active'), 500);
    });

    // Initialize from saved session
    (async function init() {
      const session = await loadSession();
      
      if (session.terminals && session.terminals.length > 0) {
        for (const t of session.terminals) {
          createTerminal(t.cwd);
        }
      } else {
        createTerminal();
      }

      if (session.treeOpen) {
        treePanel.classList.add('open');
        btnTree.classList.add('active');
        setTimeout(() => {
          fitAllTerminals();
          loadTree();
        }, 100);
      }
    })();

    // Load directory tree
    function loadTree(path = '~') {
      treeContent.innerHTML = '<div class="tree-item" style="color: rgba(255,255,255,0.4)">Loading...</div>';
      if (terminals.length > 0 && terminals[0].ws.readyState === WebSocket.OPEN) {
        terminals[0].ws.send(JSON.stringify({ type: 'tree', path }));
      }
    }

    // Render tree data
    function renderTree(data) {
      if (!data || !data.items) {
        treeContent.innerHTML = '<div class="tree-item" style="color: rgba(255,255,255,0.4)">No data</div>';
        return;
      }
      
      treeContent.innerHTML = data.items.map(item => {
        const indent = '<span class="tree-indent"></span>'.repeat(item.depth || 0);
        const icon = item.type === 'dir' ? '\uf07b ' : '\uf15b ';
        const cls = item.type === 'dir' ? 'tree-folder' : 'tree-file';
        return `<div class="tree-item ${cls}" data-path="${item.path}">${indent}${icon}${item.name}</div>`;
      }).join('');

      treeContent.querySelectorAll('.tree-folder').forEach(el => {
        el.addEventListener('click', () => {
          loadTree(el.dataset.path);
        });
      });
    }
  </script>
</body>
</html>
